<div class="space-y-8 animate-in fade-in duration-500">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h1 class="text-3xl font-black text-gray-900 dark:text-white tracking-tight">Vue d'ensemble</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Supervisez l'activité globale du système et les performances des techniciens</p>
    </div>
  </div>

  <!-- Stat Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Total Users -->
    <div class="bg-white dark:bg-gray-900 p-6 rounded-[2.5rem] border border-gray-100 dark:border-gray-800 shadow-sm hover:shadow-xl transition-all group">
      <div class="p-4 bg-blue-50 dark:bg-blue-900/30 rounded-2xl w-fit mb-4 group-hover:scale-110 transition-transform">
        <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-[0.2em]">Total Utilisateurs</p>
      <p class="text-3xl font-black text-gray-900 dark:text-white mt-1">{{ userCount() }}</p>
    </div>

    <!-- Total Tickets -->
    <div class="bg-white dark:bg-gray-900 p-6 rounded-[2.5rem] border border-gray-100 dark:border-gray-800 shadow-sm hover:shadow-xl transition-all group">
      <div class="p-4 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl w-fit mb-4 group-hover:scale-110 transition-transform">
        <svg class="w-6 h-6 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-[0.2em]">Total Tickets</p>
      <p class="text-3xl font-black text-gray-900 dark:text-white mt-1">{{ stats().total }}</p>
    </div>

    <!-- Active Tickets -->
    <div class="bg-white dark:bg-gray-900 p-6 rounded-[2.5rem] border border-gray-100 dark:border-gray-800 shadow-sm hover:shadow-xl transition-all group">
      <div class="p-4 bg-amber-50 dark:bg-amber-900/30 rounded-2xl w-fit mb-4 group-hover:scale-110 transition-transform">
        <svg class="w-6 h-6 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-[0.2em]">Tickets Actifs</p>
      <p class="text-3xl font-black text-gray-900 dark:text-white mt-1">{{ stats().inProgress + stats().todo }}</p>
    </div>

    <!-- Resolved Tickets -->
    <div class="bg-white dark:bg-gray-900 p-6 rounded-[2.5rem] border border-gray-100 dark:border-gray-800 shadow-sm hover:shadow-xl transition-all group">
      <div class="p-4 bg-emerald-50 dark:bg-emerald-900/30 rounded-2xl w-fit mb-4 group-hover:scale-110 transition-transform">
        <svg class="w-6 h-6 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
      </div>
      <p class="text-[10px] font-black text-gray-400 dark:text-gray-500 uppercase tracking-[0.2em]">Interventions Terminées</p>
      <p class="text-3xl font-black text-gray-900 dark:text-white mt-1">{{ stats().resolved }}</p>
    </div>
  </div>
</div>
