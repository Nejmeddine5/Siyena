<div class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300 pt-20">
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
          Tableau de Bord Technicien
        </h1>
        
        <div class="flex items-center space-x-3">
          <!-- Profile Button -->
          <button routerLink="/profile" class="flex items-center px-4 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm">
            <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            Mon Profil
          </button>

          <!-- Logout Button -->
          <button (click)="logout()" class="flex items-center px-4 py-2 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 transition-all shadow-sm">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Se déconnecter
          </button>
        </div>
      </div>


      <div class="grid grid-cols-1 gap-6">
        <div class="bg-white dark:bg-gray-800 shadow-sm rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700">
          <div class="px-6 py-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Notifications Récentes</h3>
            <span class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold px-2.5 py-1 rounded-full">
              {{ notificationService.notifications().length }} au total
            </span>
          </div>
          
          <div class="divide-y divide-gray-100 dark:divide-gray-700">
            <div *ngIf="notificationService.notifications().length === 0" class="p-10 text-center text-gray-500 dark:text-gray-400">
              Aucune notification pour le moment. Tout est à jour !
            </div>

            <div *ngFor="let notification of notificationService.notifications()" 
              class="p-6 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors group">
              <div class="flex items-start">
                <div class="flex-shrink-0 mt-1">
                  <div [class]="notification.read ? 'bg-gray-200' : 'bg-indigo-500'" 
                    class="h-3 w-3 rounded-full"></div>
                </div>
                <div class="ml-4 flex-1">
                  <p [class]="notification.read ? 'text-gray-600 dark:text-gray-400' : 'text-gray-900 dark:text-white font-medium'" 
                    class="text-sm">
                    {{ notification.message }}
                  </p>
                  <div class="mt-2 flex items-center text-xs text-gray-500 dark:text-gray-500">
                    <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {{ notification.createdAt | date:'medium' }}
                  </div>
                </div>
                <div class="ml-4 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button class="text-indigo-600 dark:text-indigo-400 text-sm font-medium hover:underline">
                    Marquer comme lu
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
