<div class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300 pt-20 flex flex-col md:flex-row">
  <!-- Sidebar -->
  <aside
    class="w-full md:w-64 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-3xl md:h-auto self-start md:sticky md:top-24 flex flex-col p-6 shadow-lg z-10 hidden md:flex md:ml-6 md:mt-6">
    <div class="flex flex-col h-full space-y-4">
      <div class="flex items-center justify-center mb-6">
        <img src="/media/technicien.png" alt="Technicien" class="h-28 w-28 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-inner object-cover">
      </div>

      <h2 class="text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 px-1">Navigation</h2>

      <!-- Dashboard Button (current) -->
      <button
        class="flex items-center px-4 py-3 bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800/50 rounded-xl text-sm font-medium text-indigo-700 dark:text-indigo-400 shadow-sm w-full cursor-default">
        <svg class="w-5 h-5 mr-3 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405C18.21 15.21 18 14.7 18 14.17V11a6 6 0 10-12 0v3.17c0 .53-.21 1.04-.595 1.425L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        Notifications
      </button>

      <!-- Profile Button -->
      <button routerLink="/profile"
        class="flex items-center px-4 py-3 bg-transparent border border-transparent rounded-xl text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50 hover:text-indigo-600 dark:hover:text-indigo-400 transition-all w-full group">
        <svg
          class="w-5 h-5 mr-3 text-gray-400 dark:text-gray-500 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Mon Profil
      </button>

      <div class="flex-grow"></div>

      <!-- Logout Button -->
      <button (click)="logout()"
        class="flex items-center px-4 py-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 transition-all shadow-sm w-full group mt-auto">
        <svg class="w-5 h-5 mr-3 text-red-500 dark:text-red-400 group-hover:scale-110 transition-transform" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Se déconnecter
      </button>
    </div>
  </aside>

  <!-- Mobile Menu (Visible only on small screens) -->
  <div
    class="md:hidden flex space-x-2 p-3 mx-4 mt-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-md sticky top-24 z-10">
    <button routerLink="/profile"
      class="flex-1 flex items-center justify-center px-3 py-2 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 transition-all">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      Profil
    </button>
    <button (click)="logout()"
      class="flex-1 flex items-center justify-center px-3 py-2 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 transition-all">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Déconnexion
    </button>
  </div>

  <!-- Main Content -->
  <main class="flex-1 w-full mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
          Tableau de Bord Technicien
        </h1>
      </div>


      <div class="grid grid-cols-1 gap-6">
        <div
          class="bg-white dark:bg-gray-800 shadow-sm rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700">
          <div class="px-6 py-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Notifications Récentes</h3>
            <span
              class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold px-2.5 py-1 rounded-full">
              {{ notificationService.notifications().length }} au total
            </span>
          </div>

          <div class="divide-y divide-gray-100 dark:divide-gray-700">
            <div *ngIf="notificationService.notifications().length === 0"
              class="p-10 text-center text-gray-500 dark:text-gray-400">
              Aucune notification pour le moment. Tout est à jour !
            </div>

            <div *ngFor="let notification of notificationService.notifications()"
              class="p-6 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors group">
              <div class="flex items-start">
                <div class="flex-shrink-0 mt-1">
                  <div [class]="notification.read ? 'bg-gray-200' : 'bg-indigo-500'" class="h-3 w-3 rounded-full"></div>
                </div>
                <div class="ml-4 flex-1">
                  <p [class]="notification.read ? 'text-gray-600 dark:text-gray-400' : 'text-gray-900 dark:text-white font-medium'"
                    class="text-sm">
                    {{ notification.message }}
                  </p>
                  <div class="mt-2 flex items-center text-xs text-gray-500 dark:text-gray-500">
                    <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {{ notification.createdAt | date:'medium' }}
                  </div>
                </div>
                <div class="ml-4 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button class="text-indigo-600 dark:text-indigo-400 text-sm font-medium hover:underline">
                    Marquer comme lu
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
